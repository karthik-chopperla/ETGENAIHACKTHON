# Render Blueprint — deploys both services from one file.
# Usage: Render dashboard -> New+ -> Blueprint -> connect this repo.
# Fill in NVIDIA_API_KEY manually (marked sync: false, never stored in the repo).

services:
  - type: web
    name: ikis-backend
    env: python
    plan: free
    rootDir: ikis-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn ikis_backend:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NVIDIA_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./ikis.db
      - key: GRAPH_PATH
        value: ./knowledge_graph.gpickle

  - type: web
    name: ikis-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    envVars:
      # After the backend deploys, copy its URL here (or set manually in the
      # Render dashboard) — https://ikis-backend-xxxx.onrender.com
      - key: REACT_APP_BACKEND_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
